name: feynman
channels:
  - conda-forge
dependencies:
  # C++ tooling
  - clang
  - clangxx
  - clang-tools
  - lldb
  - cmake
  - ninja
  - pkg-config
  # Parallelization
  - openmpi
  - llvm-openmp
  # Python stack (for utilities)
  - python=3.11
  - numpy
  - matplotlib
  - ipykernel
  - qiskit
  - qiskit-aer
  # Tensor-network comparison
  - networkx
  - quimb
